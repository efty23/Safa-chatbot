<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Chat Assistant</title>
<style>
  :root { --primary:#C03221; --accent:#F5B921; --bg:#FFF8EC; --ink:#2B1D0E; --sub:#8A6F4D; --line:#EFE3CC; --card:#FFFFFF; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans Bengali','Hind Siliguri',system-ui,sans-serif; background:var(--bg); color:var(--ink); height:100dvh; display:flex; flex-direction:column; }
  header { padding:12px 16px; background:var(--card); border-bottom:2px solid var(--accent); display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .logo { width:38px; height:38px; border-radius:12px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:3px 3px 0 var(--primary); }
  .biz-name { font-weight:800; font-size:16px; }
  .tagline { font-size:11.5px; color:var(--sub); }
  #chat { flex:1; overflow-y:auto; padding:16px 14px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:85%; padding:10px 14px; font-size:15px; line-height:1.55; white-space:pre-wrap; word-break:break-word; }
  .msg.user { align-self:flex-end; background:var(--ink); color:#FFF6E5; border-radius:16px 16px 4px 16px; }
  .msg.bot { align-self:flex-start; background:var(--card); border:1.5px solid var(--line); border-radius:16px 16px 16px 4px; }
  .welcome { text-align:center; margin-top:6vh; padding:0 12px; }
  .welcome .emoji { font-size:44px; margin-bottom:8px; }
  .welcome h2 { font-size:19px; margin-bottom:6px; }
  .welcome p { color:var(--sub); font-size:14px; margin-bottom:18px; }
  .sugg { display:flex; flex-direction:column; gap:8px; max-width:330px; margin:0 auto; }
  .sugg button { background:var(--card); border:1.5px solid var(--line); border-radius:12px; padding:10px 14px; font-size:14px; color:var(--ink); cursor:pointer; text-align:left; font-family:inherit; }
  .typing { align-self:flex-start; background:var(--card); border:1.5px solid var(--line); border-radius:16px 16px 16px 4px; padding:13px 16px; display:flex; gap:5px; }
  .typing span { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:bounce 1s infinite; }
  .typing span:nth-child(2) { animation-delay:0.18s; }
  .typing span:nth-child(3) { animation-delay:0.36s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.5;} 30%{transform:translateY(-5px);opacity:1;} }
  .err { align-self:center; background:#FDECEA; color:var(--primary); border-radius:10px; padding:8px 14px; font-size:13px; }
  footer { padding:10px 12px calc(14px + env(safe-area-inset-bottom)); background:var(--card); border-top:1.5px solid var(--line); display:flex; gap:8px; align-items:flex-end; flex-shrink:0; }
  textarea { flex:1; resize:none; border:1.5px solid var(--line); border-radius:14px; padding:11px 14px; font-size:15px; font-family:inherit; outline:none; background:var(--bg); color:var(--ink); max-height:110px; line-height:1.4; }
  #sendBtn { background:var(--primary); color:#FFF; border:none; border-radius:14px; width:46px; height:46px; font-size:19px; cursor:pointer; flex-shrink:0; }
  #sendBtn:disabled { background:var(--line); cursor:default; }
</style>
</head>
<body>
<header>
  <div class="logo" id="logo">💬</div>
  <div>
    <div class="biz-name" id="bizName">Loading...</div>
    <div class="tagline" id="tagline"></div>
  </div>
</header>
<div id="chat"></div>
<footer>
  <textarea id="input" rows="1" placeholder="..."></textarea>
  <button id="sendBtn" aria-label="Send">➤</button>
</footer>
<script>
let CONFIG = {};
let messages = [];
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

async function init() {
  const res = await fetch("/api/config");
  CONFIG = await res.json();
  document.title = CONFIG.businessName + " — Chat";
  document.getElementById("logo").textContent = CONFIG.logoEmoji || "💬";
  document.getElementById("bizName").textContent = CONFIG.businessName;
  document.getElementById("tagline").textContent = CONFIG.tagline || "";
  input.placeholder = CONFIG.placeholder || "Type a message...";
  const c = CONFIG.colors || {};
  if (c.primary) document.documentElement.style.setProperty("--primary", c.primary);
  if (c.accent) document.documentElement.style.setProperty("--accent", c.accent);
  if (c.background) document.documentElement.style.setProperty("--bg", c.background);
  renderWelcome();
}

function renderWelcome() {
  const w = document.createElement("div");
  w.className = "welcome";
  w.id = "welcome";
  w.innerHTML = '<div class="emoji">' + (CONFIG.logoEmoji||"💬") + '</div><h2>' + CONFIG.businessName + '</h2><p>' + (CONFIG.welcomeMessage||"") + '</p><div class="sugg"></div>';
  chat.appendChild(w);
  const sugg = w.querySelector(".sugg");
  (CONFIG.suggestions || []).forEach((s) => {
    const b = document.createElement("button");
    b.textContent = s;
    b.onclick = () => { input.value = s; input.focus(); };
    sugg.appendChild(b);
  });
}

function addMsg(role, text) {
  const d = document.createElement("div");
  d.className = "msg " + (role === "user" ? "user" : "bot");
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text || sendBtn.disabled) return;
  const wel = document.getElementById("welcome");
  if (wel) wel.remove();
  messages.push({ role: "user", content: text });
  addMsg("user", text);
  input.value = "";
  sendBtn.disabled = true;
  const t = document.createElement("div");
  t.className = "typing";
  t.innerHTML = "<span></span><span></span><span></span>";
  chat.appendChild(t);
  chat.scrollTop = chat.scrollHeight;
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages }),
    });
    const data = await res.json();
    t.remove();
    if (data.error) throw new Error(data.error);
    messages.push({ role: "assistant", content: data.reply });
    addMsg("bot", data.reply);
  } catch (e) {
    t.remove();
    const err = document.createElement("div");
    err.className = "err";
    err.textContent = "সমস্যা হয়েছে — আবার চেষ্টা করুন।";
    chat.appendChild(err);
    messages.pop();
  } finally {
    sendBtn.disabled = false;
    chat.scrollTop = chat.scrollHeight;
  }
}

sendBtn.onclick = send;
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
init();
</script>
</body>
</html>
